name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  pr_agent:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.login == 'bong-water-water-bong'
    steps:
      - uses: actions/checkout@v4
      - name: PR Agent
        uses: qodo-ai/pr-agent@v0.30
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: "https://api.opencode.ai/v1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG_FILE: .pr_agent.toml
